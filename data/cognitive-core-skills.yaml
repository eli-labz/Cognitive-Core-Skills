    summary: "Prompt Perception within perception for reliable production cognition."
    definition: "Prompt Perception is the capability to perform perception tasks with bounded, auditable behavior in enterprise workflows."
    model_relevance:
      llm: "critical"
      slm: "high"
      agent: "critical"
      world_model: "low"
    skill_type: "cognitive"
    inputs:

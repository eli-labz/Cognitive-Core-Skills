taxonomy_id: "cognitive-core-skills-v1"
version: "1.0.0"
title: "Cognitive Core Skills Taxonomy"
description: "Universal and industry-neutral taxonomy of cognitive capabilities for LLMs, SLMs, AI agents, world models, persistent wiki systems, and open knowledge catalogs."
core_definition: "Cognitive core skills are the mental operating capabilities an LLM or AI Agent needs to move from chat response to useful digital co-worker. An LLM predicts and generates language. An AI Agent wraps that LLM with memory, planning, tools, integrations, verification, and action control so it can pursue goals inside real workflows."
executive_framing: "Cognitive core skills are the agent operating brain: perception to know the situation, memory to preserve continuity, reasoning to judge, planning to sequence work, action selection to execute, verification to confirm progress, learning to improve, and governance to stay safe."
domains:
  -
    id: "perception"
    name: "Perception"
    definition: "Ability to identify what is happening now before responding or acting."
  -
    id: "memory"
    name: "Memory"
    definition: "Ability to preserve continuity across interaction, workflow, and learned experience."
  -
    id: "reasoning"
    name: "Reasoning"
    definition: "Ability to transform evidence and goals into justified decisions."
  -
    id: "planning"
    name: "Planning"
    definition: "Ability to convert goals into executable, adaptive sequences of work."
  -
    id: "action_selection"
    name: "Action Selection"
    definition: "Ability to choose the next bounded action that creates verified progress."
  -
    id: "verification"
    name: "Verification"
    definition: "Ability to confirm outcomes, detect mismatch, recover safely, and escalate."
  -
    id: "grounding"
    name: "Grounding"
    definition: "Ability to tie reasoning to external, current, verifiable reality."
  -
    id: "governance"
    name: "Governance"
    definition: "Ability to monitor confidence, risk, permissions, and policy alignment."
  -
    id: "text_based"
    name: "Text Based"
    definition: "Language-centered cognitive skills for comprehension, synthesis, and structured outputs."
  -
    id: "human_action"
    name: "Human Action"
    definition: "Cognitive and control skills for economically meaningful digital labor actions."
  -
    id: "world_model"
    name: "World Model"
    definition: "Skills for representing environment dynamics and predicting state transitions."
  -
    id: "llm_wiki"
    name: "Llm Wiki"
    definition: "Skills for maintaining persistent compounding wiki knowledge systems."
  -
    id: "okf"
    name: "Okf"
    definition: "Skills for open, machine-readable, interoperable knowledge cataloging."

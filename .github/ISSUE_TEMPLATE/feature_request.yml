name: Feature request
description: Propose a new skill, schema improvement, benchmark, or documentation enhancement
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your proposal
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which files or domains are impacted?
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How should we know this is complete?

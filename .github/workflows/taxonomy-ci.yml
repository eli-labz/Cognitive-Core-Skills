name: taxonomy-ci

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  taxonomy-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest jsonschema

      - name: Run taxonomy and fixture tests
        run: |
          pytest tests/test_cognitive_core_taxonomy.py tests/test_rubric_benchmark_fixtures.py -q
